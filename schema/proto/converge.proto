// Converge Protocol v1 - High-level gRPC API for mobile and CLI clients.
//
// This is the primary API for iOS, Android, and CLI applications.
// It implements the stream-first architecture defined in CROSS_PLATFORM_CONTRACT.md.
//
// Key concepts:
// - Bidirectional streaming for live convergence
// - Proposals become Facts after passing through convergence layer
// - Truths are the boundary, not the UI
// - Sequence numbers enable resume after disconnect
//
// This proto is self-contained and does not import context.proto.
// The low-level context.proto is for the Elixir/Mnesia ledger backend.

syntax = "proto3";

package converge.v1;

import "google/protobuf/struct.proto";

option java_package = "zone.converge.proto.v1";
option java_multiple_files = true;
option objc_class_prefix = "CVG";
option swift_prefix = "Converge";

// ============================================================================
// CONVERGE SERVICE - Main bidirectional streaming API
// ============================================================================

// ConvergeService is the primary API for mobile and CLI clients.
//
// The Stream RPC provides real-time bidirectional communication:
// - Client sends control messages (submit jobs, approve proposals, inject facts)
// - Server sends events (facts, proposals, traces, decisions, run status)
//
// Unary RPCs provide polling fallback for degraded network conditions.
service ConvergeService {
  // Bidirectional stream for live convergence.
  // Client sends control messages, server sends events.
  // This is the PRIMARY transport - prefer this over polling.
  rpc Stream(stream ClientMessage) returns (stream ServerEvent);

  // Submit a new job (can also be done via Stream).
  // Returns immediately with job_id; use Stream or GetEvents for progress.
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);

  // Get current job status (polling fallback).
  rpc GetJob(GetJobRequest) returns (GetJobResponse);

  // Get events since sequence (polling fallback).
  // Use this when streaming is unavailable.
  rpc GetEvents(GetEventsRequest) returns (GetEventsResponse);

  // Session handshake - capability negotiation.
  // Call this at session start to discover available packs and features.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

// ============================================================================
// CLIENT → SERVER: Control Messages
// ============================================================================

// ClientMessage wraps all client-to-server control messages.
// Sent over the bidirectional Stream RPC.
message ClientMessage {
  // Unique request ID for correlation with Ack responses.
  string request_id = 1;

  oneof message {
    // Job control
    SubmitJobRequest submit_job = 10;
    CancelJobRequest cancel_job = 11;

    // Run control (human-in-the-loop)
    InjectFactRequest inject_fact = 20;
    ApproveProposalRequest approve = 21;
    RejectProposalRequest reject = 22;
    PauseRunRequest pause = 23;
    ResumeRunRequest resume = 24;
    UpdateBudgetRequest update_budget = 25;

    // Stream control
    SubscribeRequest subscribe = 30;
    UnsubscribeRequest unsubscribe = 31;
    ResumeFromSequenceRequest resume_from = 32;

    // Heartbeat
    Ping ping = 40;
  }
}

// ============================================================================
// SERVER → CLIENT: Events
// ============================================================================

// ServerEvent wraps all server-to-client events.
// Sent over the bidirectional Stream RPC.
message ServerEvent {
  // Monotonic sequence number for ordering and resume.
  // Clients should track the highest sequence seen.
  // On reconnect, resume from last known sequence.
  uint64 sequence = 1;

  // Timestamp when this event was created (nanoseconds since Unix epoch).
  uint64 timestamp_ns = 2;

  oneof event {
    // Context events (the core data)
    ContextEntry entry = 10;

    // Run lifecycle changes
    RunStatusChanged run_status = 20;

    // Job lifecycle
    JobCreated job_created = 30;
    JobCompleted job_completed = 31;

    // Stream control responses
    Subscribed subscribed = 40;
    ResumedFrom resumed = 41;

    // Request acknowledgements
    Ack ack = 50;

    // Heartbeat response
    Pong pong = 60;

    // Errors
    Error error = 70;
  }
}

// ============================================================================
// CONTEXT ENTRIES - The core data model
// ============================================================================

// ContextEntry represents a single entry in the append-only context ledger.
//
// Entry types:
// - FACT: Accepted truth, now part of context (immutable)
// - PROPOSAL: Suggested change, pending convergence
// - TRACE: Audit record of what happened and why
// - DECISION: Invariant check result (accept/reject/halt)
message ContextEntry {
  // Unique identifier for this entry.
  string entry_id = 1;

  // Type of entry (fact, proposal, trace, decision).
  EntryType entry_type = 2;

  // Links related entries across actors and time.
  string correlation_id = 3;

  // The run that produced this entry.
  string run_id = 4;

  // The job this entry belongs to.
  string job_id = 5;

  // Which truth this satisfies (if applicable).
  optional string truth_id = 6;

  // Who performed this action.
  Actor actor = 7;

  // For ordering and resume.
  uint64 sequence = 8;
  uint64 timestamp_ns = 9;

  // Context version at time of entry.
  uint64 context_version = 10;

  // The actual content (structured data).
  google.protobuf.Struct payload = 11;

  // For distributed tracing (OpenTelemetry compatible).
  optional string trace_id = 12;
  optional string span_id = 13;
}

// EntryType classifies context entries.
enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;

  // Accepted truth, now in context. Cannot be undone, only corrected.
  ENTRY_TYPE_FACT = 1;

  // Suggested change, pending. Can be rejected by invariants.
  ENTRY_TYPE_PROPOSAL = 2;

  // Audit record. Answers "why did this happen?"
  ENTRY_TYPE_TRACE = 3;

  // Invariant check result. May trigger halt if violated.
  ENTRY_TYPE_DECISION = 4;
}

// Actor represents who performed an action.
message Actor {
  // Type of actor.
  ActorType type = 1;

  // Unique identifier (user ID, agent ID, or system component).
  string id = 2;

  // Device identifier (for mobile clients).
  optional string device_id = 3;

  // Organization context.
  optional string org_id = 4;

  // Access roles.
  repeated string roles = 5;

  // Human-readable name.
  optional string display_name = 6;
}

// ActorType classifies actors.
enum ActorType {
  ACTOR_TYPE_UNSPECIFIED = 0;

  // Human user (via mobile app, CLI, etc.)
  ACTOR_TYPE_USER = 1;

  // AI agent or automated process.
  ACTOR_TYPE_AGENT = 2;

  // System component (scheduler, garbage collector, etc.)
  ACTOR_TYPE_SYSTEM = 3;

  // External service (webhook, payment provider, etc.)
  ACTOR_TYPE_EXTERNAL = 4;
}

// ============================================================================
// RUN LIFECYCLE
// ============================================================================

// RunStatusChanged is emitted when a run's status changes.
message RunStatusChanged {
  string run_id = 1;
  string job_id = 2;

  // New status.
  RunStatus status = 3;

  // Previous status.
  RunStatus previous_status = 4;

  // Details for specific states.
  optional HaltInfo halt_info = 5;       // When halted
  optional WaitingInfo waiting_info = 6;  // When waiting
  optional ConvergedInfo converged_info = 7; // When converged

  // Current stats.
  uint32 facts_count = 10;
  uint32 pending_proposals = 11;
  uint32 cycles_completed = 12;
}

// RunStatus represents the lifecycle state of a convergence run.
enum RunStatus {
  RUN_STATUS_UNSPECIFIED = 0;

  // Not yet started.
  RUN_STATUS_PENDING = 1;

  // Truths firing, facts arriving.
  RUN_STATUS_RUNNING = 2;

  // Stable state reached, no more truths to fire.
  RUN_STATUS_CONVERGED = 3;

  // Invariant violated, explanation available.
  RUN_STATUS_HALTED = 4;

  // Blocked on external input (human approval, etc.)
  RUN_STATUS_WAITING = 5;

  // User cancelled.
  RUN_STATUS_CANCELLED = 6;
}

// HaltInfo provides details when a run is halted due to invariant violation.
message HaltInfo {
  // Which truth was violated.
  string truth_id = 1;

  // Human-readable explanation.
  string reason = 2;

  // Can the user restart after fixing the issue?
  bool can_restart = 3;

  // Is break-glass override available?
  bool break_glass_available = 4;
}

// WaitingInfo provides details when a run is waiting for external input.
message WaitingInfo {
  // Human-readable list of what we're waiting for.
  // e.g., ["approval from @manager", "payment confirmation"]
  repeated string waiting_for = 1;

  // Actor IDs who can unblock the run.
  repeated string actor_ids = 2;

  // Auto-cancel after this timeout (nanoseconds). Optional.
  optional uint64 timeout_ns = 3;
}

// ConvergedInfo provides details when a run has successfully converged.
message ConvergedInfo {
  // Total duration from start to convergence.
  uint64 duration_ms = 1;

  // Total facts produced.
  uint32 total_facts = 2;

  // Total convergence cycles.
  uint32 total_cycles = 3;
}

// ============================================================================
// JOB MANAGEMENT
// ============================================================================

// SubmitJobRequest starts a new convergence job.
message SubmitJobRequest {
  // Idempotency key for replay safety.
  // Format: {device_id}:{action}:{timestamp_ms}:{random_4}
  // Example: ios:abc:create_invoice:1704067200000:f7a2
  string idempotency_key = 1;

  // Which blueprint to run.
  string blueprint_id = 2;

  // Which packs to load.
  repeated string pack_ids = 3;

  // Initial context/seeds.
  repeated SeedFact seeds = 4;

  // Budget constraints.
  optional Budget budget = 5;

  // Correlation for tracing.
  optional string correlation_id = 6;
  optional string parent_trace_id = 7;
}

// SeedFact provides initial facts to seed the context.
message SeedFact {
  // Fact key (e.g., "customer_id", "invoice_amount").
  string key = 1;

  // Fact value (structured data).
  google.protobuf.Struct value = 2;

  // Which truth this satisfies (optional).
  optional string truth_id = 3;
}

// Budget constrains resource usage for a job.
message Budget {
  // Maximum convergence cycles.
  optional uint32 max_cycles = 1;

  // Maximum facts to produce.
  optional uint32 max_facts = 2;

  // Maximum duration (milliseconds).
  optional uint64 max_duration_ms = 3;

  // Maximum LLM tokens.
  optional uint32 max_tokens = 4;

  // Maximum cost (USD).
  optional double max_cost_usd = 5;
}

// SubmitJobResponse confirms job creation.
message SubmitJobResponse {
  string job_id = 1;
  string run_id = 2;

  // Initial sequence for streaming.
  uint64 sequence = 3;
}

// JobCreated is emitted when a job is created.
message JobCreated {
  string job_id = 1;
  string run_id = 2;
  string blueprint_id = 3;
  repeated string pack_ids = 4;
}

// JobCompleted is emitted when a job finishes (converged, halted, or cancelled).
message JobCompleted {
  string job_id = 1;
  string run_id = 2;
  RunStatus final_status = 3;

  // Final stats.
  uint32 total_facts = 4;
  uint32 total_cycles = 5;
  uint64 duration_ms = 6;

  // If halted.
  optional HaltInfo halt_info = 7;
}

// GetJobRequest queries a job's current status.
message GetJobRequest {
  string job_id = 1;
}

// GetJobResponse returns a job's current status.
message GetJobResponse {
  string job_id = 1;
  string run_id = 2;
  RunStatus status = 3;
  uint64 latest_sequence = 4;

  // Current state.
  uint32 facts_count = 10;
  uint32 pending_proposals = 11;
  uint32 cycles_completed = 12;

  // If halted or converged.
  optional HaltInfo halt_info = 20;
  optional ConvergedInfo converged_info = 21;
}

// CancelJobRequest cancels a running job.
message CancelJobRequest {
  string job_id = 1;
  optional string reason = 2;
}

// ============================================================================
// RUN CONTROL (Human-in-the-Loop)
// ============================================================================

// InjectFactRequest injects a fact into a running context.
// Used for human-in-the-loop input.
message InjectFactRequest {
  string run_id = 1;

  // Fact key.
  string key = 2;

  // Fact value (structured data).
  google.protobuf.Struct payload = 3;

  // Which truth this satisfies (optional).
  optional string truth_id = 4;

  // Idempotency key for replay safety.
  string idempotency_key = 5;
}

// ApproveProposalRequest approves a pending proposal.
message ApproveProposalRequest {
  string run_id = 1;
  string proposal_id = 2;

  // Optional approval comment.
  optional string comment = 3;
}

// RejectProposalRequest rejects a pending proposal.
message RejectProposalRequest {
  string run_id = 1;
  string proposal_id = 2;

  // Rejection reason (required).
  string reason = 3;
}

// PauseRunRequest pauses a running convergence.
message PauseRunRequest {
  string run_id = 1;
  optional string reason = 2;
}

// ResumeRunRequest resumes a paused convergence.
message ResumeRunRequest {
  string run_id = 1;
}

// UpdateBudgetRequest modifies the budget of a running job.
message UpdateBudgetRequest {
  string run_id = 1;
  Budget budget = 2;
}

// ============================================================================
// STREAM CONTROL
// ============================================================================

// SubscribeRequest subscribes to events for a job, run, or correlation.
message SubscribeRequest {
  // What to subscribe to (at least one required).
  optional string job_id = 1;
  optional string run_id = 2;
  optional string correlation_id = 3;

  // Resume from sequence (0 = from now, omit for all history).
  uint64 since_sequence = 4;

  // Filter by entry types (empty = all).
  repeated EntryType entry_types = 5;
}

// UnsubscribeRequest removes a subscription.
message UnsubscribeRequest {
  optional string job_id = 1;
  optional string run_id = 2;
  optional string correlation_id = 3;
}

// ResumeFromSequenceRequest resumes the stream from a specific sequence.
// Use after reconnection.
message ResumeFromSequenceRequest {
  // Resume from this sequence.
  uint64 sequence = 1;

  // If gap is too large, allow server to send snapshot.
  bool allow_snapshot = 2;
}

// Subscribed confirms a subscription was created.
message Subscribed {
  string subscription_id = 1;
  uint64 current_sequence = 2;
}

// ResumedFrom confirms stream was resumed from a sequence.
message ResumedFrom {
  uint64 from_sequence = 1;
  uint64 to_sequence = 2;

  // If snapshot was required due to large gap.
  bool snapshot_sent = 3;
  optional bytes snapshot = 4;
}

// ============================================================================
// CAPABILITY NEGOTIATION
// ============================================================================

// GetCapabilitiesRequest initiates session handshake.
// Call at session start to discover available features.
message GetCapabilitiesRequest {
  // Device identifier.
  string device_id = 1;

  // App version (semver).
  string app_version = 2;

  // Platform: ios, android, cli, web
  string platform = 3;
}

// GetCapabilitiesResponse returns available features and packs.
message GetCapabilitiesResponse {
  // Available packs.
  repeated PackInfo packs = 1;

  // Active truths.
  repeated TruthInfo active_truths = 2;

  // Streaming capabilities.
  StreamingCapabilities streaming = 3;

  // Feature flags.
  bool determinism_mode_available = 4;

  // Server info.
  string server_version = 5;
  uint64 server_time_ns = 6;
}

// PackInfo describes an available pack.
message PackInfo {
  string pack_id = 1;
  string name = 2;
  string version = 3;
  repeated string truth_ids = 4;
}

// TruthInfo describes an active truth.
message TruthInfo {
  string truth_id = 1;
  string pack_id = 2;
  string description = 3;
}

// StreamingCapabilities describes available transports.
message StreamingCapabilities {
  repeated TransportInfo transports = 1;
  string default_transport = 2;
  bool resume_supported = 3;
  uint64 max_resume_gap = 4;
}

// TransportInfo describes a transport option.
message TransportInfo {
  // Transport type: h2-grpc, h3-grpc, websocket, sse
  string type = 1;

  // Status: supported, experimental, planned
  string status = 2;
}

// ============================================================================
// HEARTBEAT
// ============================================================================

// Ping is sent by client to check connection liveness.
message Ping {
  uint64 client_time_ns = 1;
}

// Pong is the server response to Ping.
message Pong {
  uint64 client_time_ns = 1;
  uint64 server_time_ns = 2;
}

// ============================================================================
// ACKNOWLEDGEMENTS & ERRORS
// ============================================================================

// Ack acknowledges a client request.
message Ack {
  // Correlates with ClientMessage.request_id.
  string request_id = 1;

  bool success = 2;
  optional string error_code = 3;
  optional string error_message = 4;
}

// Error reports a server-side error.
message Error {
  // Error code (e.g., "INVALID_ARGUMENT", "NOT_FOUND").
  string code = 1;

  // Human-readable error message.
  string message = 2;

  // Can the client retry?
  bool recoverable = 3;

  // If this error is in response to a specific request.
  optional string request_id = 4;

  // Additional details.
  map<string, string> details = 5;
}

// ============================================================================
// EVENTS POLLING (Fallback)
// ============================================================================

// GetEventsRequest polls for events (fallback when streaming unavailable).
message GetEventsRequest {
  string job_id = 1;
  uint64 since_sequence = 2;
  uint32 limit = 3;
  repeated EntryType entry_types = 4;
}

// GetEventsResponse returns polled events.
message GetEventsResponse {
  repeated ContextEntry entries = 1;
  uint64 latest_sequence = 2;
  bool has_more = 3;
}
