# Drafting Short Template
# Two-step drafting: Perplexity research -> Anthropic draft

name: drafting-short
description: Short drafting flow with Perplexity research and Anthropic drafting.
version: "1.0.0"
spec: specs/drafting-short.feature

budget:
  max_cycles: 10
  max_facts: 100

agents:
  - name: DraftingResearchAgent
    type: llm
    requirements:
      cost_class: medium
      requires_web_search: true
      min_quality: 0.75
    output_key: Signals
    depends_on:
      - Seeds
    system_prompt: |
      You are a research assistant. Use web search to gather citations and terminology.
      Focus on sources and terms needed for drafting.
    prompt_template: |
      Research sources and terminology for the following drafting request:

      {context}

      Provide concise research notes with citations.

  - name: DraftingComposerAgent
    type: llm
    requirements:
      cost_class: medium
      max_latency_ms: 3000
      requires_reasoning: true
      min_quality: 0.85
    output_key: Strategies
    depends_on:
      - Signals
    system_prompt: |
      You are a drafting assistant. Compose a clear, structured draft using research notes.
    prompt_template: |
      Draft a structured response using the research notes below:

      {context}

      Provide a concise, well-structured draft.
