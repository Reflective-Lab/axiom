# Growth Strategy Template
# A multi-agent template for analyzing markets and generating growth strategies.
#
# Pipeline:
#   Seeds → MarketSignalAgent → CompetitorAgent → StrategyAgent → EvaluationAgent
#
# Usage:
#   POST /api/v1/templates/jobs
#   {
#     "template": "growth-strategy",
#     "overrides": {
#       "seeds": [
#         { "id": "market:your-market", "content": "Your market description" },
#         { "id": "product:your-product", "content": "Your product description" }
#       ]
#     }
#   }

name: growth-strategy
description: Multi-agent growth strategy analysis with market signals, competitor analysis, strategy synthesis, and evaluation.
version: "1.0.0"

budget:
  max_cycles: 50
  max_facts: 500

agents:
  # Market Signal Agent: Extract market signals from seeds
  # Uses fast/cheap models for high-volume extraction
  - name: MarketSignalAgent
    type: llm
    requirements: fast_extraction
    output_key: Signals
    depends_on:
      - Seeds
    system_prompt: |
      You are a market analyst specializing in identifying key market signals.
      Extract actionable market insights from the provided context.
      Focus on: market trends, growth indicators, adoption patterns, and market size.
    prompt_template: |
      Analyze the following market and product information and extract key market signals:

      {context}

      Provide 2-4 concise market signals, each as a separate observation.

  # Competitor Agent: Analyze competitive landscape
  # Uses analysis-grade models, optionally with web search
  - name: CompetitorAgent
    type: llm
    requirements:
      cost_class: medium
      max_latency_ms: 15000
      requires_web_search: true
      min_quality: 0.75
    output_key: Competitors
    depends_on:
      - Signals
    system_prompt: |
      You are a competitive intelligence analyst.
      Identify key competitors and analyze their positioning based on market signals.
      Focus on: direct competitors, market positioning, strengths/weaknesses.
    prompt_template: |
      Based on the market signals below, identify and analyze key competitors:

      {context}

      Provide analysis of 2-3 key competitors.

  # Strategy Agent: Synthesize growth strategies
  # Uses reasoning-capable models for strategic synthesis
  - name: StrategyAgent
    type: llm
    requirements:
      cost_class: medium
      requires_reasoning: true
      min_quality: 0.8
    output_key: Strategies
    depends_on:
      - Signals
      - Competitors
    system_prompt: |
      You are a strategic planner specializing in growth strategy.
      Synthesize actionable growth strategies based on market signals and competitive analysis.
      Focus on: differentiation, market entry, growth levers, and go-to-market.
    prompt_template: |
      Based on the market signals and competitive analysis below, propose growth strategies:

      {context}

      Propose 2-3 distinct growth strategies with clear rationale.

  # Evaluation Agent: Rank and evaluate strategies
  # Uses deep research models for thorough evaluation
  - name: EvaluationAgent
    type: llm
    requirements:
      cost_class: expensive
      requires_reasoning: true
      min_quality: 0.85
    output_key: Evaluations
    depends_on:
      - Strategies
    system_prompt: |
      You are a strategy evaluator with expertise in business analysis.
      Evaluate proposed strategies for feasibility, impact, and alignment with market conditions.
      Provide honest assessments including potential risks and challenges.
    prompt_template: |
      Evaluate the following growth strategies:

      {context}

      For each strategy, provide:
      1. Feasibility score (1-10)
      2. Potential impact assessment
      3. Key risks and mitigations
      4. Recommended priority

validation:
  min_confidence: 0.7
  max_content_length: 10000
  forbidden_terms:
    - "guaranteed"
    - "100% certain"
    - "risk-free"
    - "impossible to fail"
  require_provenance: true

invariants:
  - BrandSafetyInvariant

metadata:
  category: business-strategy
  tags:
    - growth
    - market-analysis
    - competitive-intelligence
  author: converge-team
