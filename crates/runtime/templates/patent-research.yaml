# Patent Research Template - Wiring Configuration
name: patent-research
version: "1.0.0"
description: Governed patent research with evidence and approvals
spec: specs/patent-research.feature

requires:
  core: ">=0.6.0"
  runtime_api: ">=0.1.0"

budget:
  max_cycles: 20
  max_facts: 200

agents:
  - id: matter_policy_builder
    requirements: deterministic

  - id: matter_context_builder
    requirements: deterministic

  - id: invention_capture
    requirements:
      cost_class: low
      requires_reasoning: true

  - id: invention_summary
    requirements:
      cost_class: low
      requires_reasoning: true

  - id: claim_seed_generator
    requirements:
      cost_class: low
      requires_reasoning: true

  - id: patent_query_builder
    requirements: fast_extraction

  - id: patent_operator_planner
    requirements:
      cost_class: low
      requires_reasoning: true

  - id: patent_search_executor
    requirements:
      cost_class: medium
      max_latency_ms: 20000

  - id: patent_evidence_collector
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: prior_art_shortlist
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: claim_risk_flagger
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: enrichment_loop
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: claim_strategy_builder
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: claim_chart_generator
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: patent_claims_analyzer
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: patent_landscape_analyzer
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: patent_report_assembler
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: spec_draft_builder
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: support_matrix_builder
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: draft_pack_assembler
    requirements:
      cost_class: medium
      requires_reasoning: true

  - id: patent_alert_agent
    requirements: fast_extraction

  - id: patent_submission_agent
    requirements: deterministic

  - id: patent_approval_recorder
    requirements: deterministic
