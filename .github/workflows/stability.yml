name: Stability

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly Monday morning (6am UTC = 7am London)
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  # ── Regression gate: full workspace validation ─────────────────────────

  regression-gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Run regression gate
        run: |
          cargo check --workspace
          cargo test --workspace

  # ── Supply chain: security & compliance ───────────────────────────────

  security-blocking:
    name: Security Audit (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo-audit (blocking)
        run: cargo audit --deny warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Reset advisory database cache
        run: rm -rf "${CARGO_HOME:-$HOME/.cargo}/advisory-dbs"
      - name: Run cargo-deny
        run: cargo deny check advisories licenses bans sources

  # ── Optional: Live provider endpoints (if secrets configured) ─────────

  live-endpoints:
    name: Live Provider Tests
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Run live endpoint tests
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY is not configured; skipping live provider tests."
            exit 0
          fi
          cargo test --workspace -- --include-ignored live
