name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ["rust"]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - name: Build core crates for analysis
        run: cargo check -p converge-traits -p converge-core -p converge-provider -p converge-domain
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
