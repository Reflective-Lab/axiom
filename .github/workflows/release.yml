name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in converge-traits converge-core converge-provider converge-experience converge-knowledge ortools-sys converge-optimization converge-domain converge-tool; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify
            sleep 30  # Allow crates.io index to update
          done
