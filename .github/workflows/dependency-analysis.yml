name: Dependency Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  dependency-analysis:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Check compatible dependency freshness
        run: |
          set -euo pipefail
          output="$(cargo update --workspace --dry-run 2>&1)"
          printf '%s\n' "$output"
          if ! printf '%s\n' "$output" | grep -q "Locking 0 packages"; then
            {
              echo "### Dependency Freshness"
              echo
              echo "Cargo found pending compatible dependency updates."
              echo "Run \`cargo update --workspace\`, validate, and commit the updated lockfile."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          {
            echo "### Dependency Freshness"
            echo
            echo "No pending Rust ${{ env.RUST_VERSION }} compatible lockfile updates."
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Reset advisory database cache
        run: rm -rf "${CARGO_HOME:-$HOME/.cargo}/advisory-dbs"
      - name: Run cargo-deny
        run: cargo deny check licenses bans sources
      - name: Record deps.rs badge status
        continue-on-error: true
        run: |
          curl --fail --silent --show-error --location --retry 3 \
            --output deps-rs.svg \
            https://deps.rs/repo/github/Reflective-Lab/axiom/status.svg
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import html
          import re

          svg = open("deps-rs.svg", encoding="utf-8").read()
          labels = [html.unescape(value) for value in re.findall(r">([^<]+)<", svg)]
          status = labels[-1] if labels else "unknown"
          print("### deps.rs Badge")
          print()
          print(f"- Status: `{status}`")
          print("- The blocking gate is `cargo update --workspace --dry-run` above.")
          PY
      - name: Summarize dependency graph
        run: |
          cargo metadata --format-version 1 > dependency-metadata.json
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json

          metadata = json.load(open("dependency-metadata.json", encoding="utf-8"))
          root_id = metadata["workspace_members"][0]
          packages = {package["id"]: package for package in metadata["packages"]}
          root = packages[root_id]
          direct_runtime = [
              dependency for dependency in root["dependencies"]
              if dependency.get("kind") is None
          ]
          direct_dev = [
              dependency for dependency in root["dependencies"]
              if dependency.get("kind") == "dev"
          ]
          registry_packages = [
              package for package in metadata["packages"]
              if str(package.get("source") or "").startswith("registry+")
          ]

          print("### Dependency Analysis")
          print()
          print(f"- Workspace packages: {len(metadata['workspace_members'])}")
          print(f"- Registry packages: {len(registry_packages)}")
          print(f"- Direct runtime dependencies: {len(direct_runtime)}")
          print(f"- Direct dev dependencies: {len(direct_dev)}")
          print("- cargo-deny checks: licenses, bans, sources")
          print("- advisory checks: covered by the Security workflow")
          PY
