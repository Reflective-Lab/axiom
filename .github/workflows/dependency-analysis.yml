name: Dependency Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  dependency-analysis:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Run cargo-deny
        run: cargo deny check advisories licenses bans sources
      - name: Fetch latest versions from deps.rs
        run: |
          curl --fail --silent --show-error --retry 3 \
            --output deps-rs.html \
            https://deps.rs/repo/github/Reflective-Lab/axiom
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import html
          import re

          page = open("deps-rs.html", encoding="utf-8").read()
          rows = re.findall(
              r'<tr><td>.*?<a href="/crate/([^/]+)/[^"]+">([^<]+)</a>.*?</td>'
              r'<td class="has-text-right"><code>([^<]+)</code></td>'
              r'<td class="has-text-right"><code>([^<]+)</code></td>'
              r'<td class="has-text-right"><span class="tag [^"]+">([^<]+)</span></td>',
              page,
              flags=re.S,
          )

          if not rows:
              raise SystemExit("could not parse deps.rs dependency table")

          print("### deps.rs Latest Versions")
          print()
          print("| Crate | Required | Latest | Status |")
          print("|---|---:|---:|---|")
          for _, crate, required, latest, status in rows:
              print(
                  "| "
                  + " | ".join(
                      html.unescape(value).replace("|", "\\|")
                      for value in [crate, required, latest, status]
                  )
                  + " |"
              )
          PY
      - name: Summarize dependency graph
        run: |
          cargo metadata --format-version 1 > dependency-metadata.json
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json

          metadata = json.load(open("dependency-metadata.json", encoding="utf-8"))
          root_id = metadata["workspace_members"][0]
          packages = {package["id"]: package for package in metadata["packages"]}
          root = packages[root_id]
          direct_runtime = [
              dependency for dependency in root["dependencies"]
              if dependency.get("kind") is None
          ]
          direct_dev = [
              dependency for dependency in root["dependencies"]
              if dependency.get("kind") == "dev"
          ]
          registry_packages = [
              package for package in metadata["packages"]
              if str(package.get("source") or "").startswith("registry+")
          ]

          print("### Dependency Analysis")
          print()
          print(f"- Workspace packages: {len(metadata['workspace_members'])}")
          print(f"- Registry packages: {len(registry_packages)}")
          print(f"- Direct runtime dependencies: {len(direct_runtime)}")
          print(f"- Direct dev dependencies: {len(direct_dev)}")
          print("- cargo-deny checks: advisories, licenses, bans, sources")
          PY
